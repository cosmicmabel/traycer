name: Bug report
description: Report a problem with the web app, host server, or protocol
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please search existing issues first.
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Web app (clients/web)
        - Host server (host/)
        - GUI (clients/gui-app)
        - Protocol (protocol/)
        - Other / not sure
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "e.g. Ubuntu 24.04, macOS 15 (arm64)"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the host with `bun host/src/index.ts ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs or error output. Please redact any secrets.
      render: shell
